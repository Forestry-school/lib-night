<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧晚接接送系統 2.0 (森林溫馨版)</title>
    <style>
        :root {
            /* 🌲 吉卜力森林系配色 */
            --primary: #557A46;        /* 森林綠：班級卡片、主標題 */
            --primary-hover: #3B5A2F;  /* 深綠：點擊時的顏色 */
            --bg: #F0F4E9;             /* 米草綠：整個網頁的溫暖背景 */
            --card-bg: #FFFFFF;        /* 純白：主容器背景 */
            --text-main: #4A4A4A;      /* 橡果灰：主要文字 */
            --text-muted: #8D998B;     /* 葉灰色：次要文字與外框 */
            --success: #739E82;        /* 柔和綠：登記成功的顏色 */
            --error: #D97E7A;          /* 磚紅色：錯誤提示的顏色 */
            --student-btn-bg: #FFFDF7; /* 暖米黃：學生卡片的底色 */
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nunito', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans TC", sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 16px;
            min-height: 100vh;
            /* 加上一點柔和的漸層背景 */
            background-image: linear-gradient(135deg, #F0F4E9 0%, #E2EBD5 100%);
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: var(--card-bg);
            padding: 30px 24px;
            border-radius: 24px; /* 變得更圓潤可愛 */
            box-shadow: 0 10px 25px rgba(85, 122, 70, 0.08); /* 綠色調的柔和陰影 */
            border: 2px solid #E8EEDF;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 32px;
            margin-bottom: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        #loading {
            text-align: center;
            color: var(--text-muted);
            font-size: 22px;
            padding: 40px 0;
        }

        .grid-layout {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 16px;
            margin-top: 20px;
        }

        /* 卡片共用樣式 */
        .card {
            border: 2px solid transparent;
            border-radius: 16px; /* 圓角放大 */
            padding: 24px 10px;
            text-align: center;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1); /* 點擊動畫更Ｑ彈 */
            -webkit-tap-highlight-color: transparent;
            user-select: none;
        }

        /* 班級卡片 */
        .class-card {
            background-color: var(--primary);
            color: white;
            font-size: 28px;
            font-weight: 700;
            box-shadow: 0 4px 12px rgba(85, 122, 70, 0.2);
        }

        .class-card:active {
            transform: scale(0.92);
            background-color: var(--primary-hover);
        }

        /* 學生卡片 */
        .student-card {
            background-color: var(--student-btn-bg);
            border: 2px solid #EAE6D8; 
            color: var(--text-muted);
            font-size: 22px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.03);
        }

        .student-card b {
            font-size: 28px;
            display: block;
            margin-top: 8px;
            color: var(--text-main);
        }

        .student-card:active {
            transform: scale(0.92);
            background-color: #F4F1E1;
            border-color: #D3CDB3;
        }

        /* 返回按鈕 */
        #backBtn {
            width: 100%;
            background-color: #B0BBAA; /* 柔和的灰綠色 */
            color: white;
            border: none;
            padding: 18px;
            border-radius: 16px;
            font-size: 22px;
            font-weight: 700;
            cursor: pointer;
            margin-bottom: 20px;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        #backBtn:active {
            background-color: #8D998B;
            transform: scale(0.98);
        }

        .section-title {
            font-size: 24px;
            color: var(--text-muted);
            margin-bottom: 16px;
            font-weight: 700;
            text-align: center;
        }

        /* 狀態樣式 */
        .logging {
            background-color: #E2EBD5 !important;
            color: var(--primary) !important;
            border-color: transparent !important;
            cursor: not-allowed;
            font-size: 22px !important;
        }

        .success {
            background-color: var(--success) !important;
            color: white !important;
            border-color: transparent !important;
            box-shadow: 0 4px 12px rgba(115, 158, 130, 0.3) !important;
        }
        .success b { color: white !important; }

        .error {
            background-color: var(--error) !important;
            color: white !important;
            border-color: transparent !important;
        }
        .error b { color: white !important; }
    </style>
</head>
<body>

<div class="container">
    <h1>🌱 晚接登記系統</h1>
    
    <div id="loading">讀取名單中，請稍候...</div>
    
    <button id="backBtn" onclick="resetView()" style="display:none;">🍃 返回選擇班級</button>
    
    <div id="viewTitle" class="section-title" style="display:none;">請選擇班級</div>

    <div id="cardGrid" class="grid-layout"></div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbxxWN5IfwhRapNIMVjmNLTkiELGLFEHwydxEHrawYIhWwPLLeQ81kKMRI_0JrAKAIK3/exec';
    
    let allStudents = [];

    window.onload = function() {
        fetch(`${API_URL}?action=getStudents`)
            .then(response => response.json())
            .then(data => {
                allStudents = data;
                document.getElementById('loading').style.display = 'none';
                document.getElementById('viewTitle').style.display = 'block';
                renderClasses();
            })
            .catch(error => {
                document.getElementById('loading').innerText = "❌ 載入失敗，請確認網路連線。";
                console.error(error);
            });
    }

    function renderClasses() {
        const grid = document.getElementById('cardGrid');
        const viewTitle = document.getElementById('viewTitle');
        const backBtn = document.getElementById('backBtn');
        
        grid.innerHTML = ''; 
        viewTitle.innerText = '🎯 請選擇班級';
        backBtn.style.display = 'none';

        const classes = [...new Set(allStudents.map(s => s.className))].sort();
        
        classes.forEach(cls => {
            let card = document.createElement('div');
            card.className = 'card class-card';
            card.innerText = cls;
            card.onclick = () => renderStudents(cls);
            grid.appendChild(card);
        });
    }

    function renderStudents(cls) {
        const grid = document.getElementById('cardGrid');
        const viewTitle = document.getElementById('viewTitle');
        const backBtn = document.getElementById('backBtn');
        
        grid.innerHTML = '';
        viewTitle.innerText = `👥 【${cls}】學生名單`;
        backBtn.style.display = 'block';

        const classStudents = allStudents.filter(s => s.className === cls);
        
        classStudents.forEach(student => {
            const seatStr = String(student.seat).padStart(2, '0');
            
            let card = document.createElement('div');
            card.className = 'card student-card';
            card.innerHTML = `${seatStr}號<br><b>${student.name}</b>`;
            
            card.onclick = () => logPickup(student.className, seatStr, student.name, card);
            grid.appendChild(card);
        });
    }

    function resetView() {
        renderClasses();
    }

    function logPickup(className, seatStr, name, cardElement) {
        if (cardElement.classList.contains('logging')) return;

        cardElement.classList.add('logging');
        const originalHTML = cardElement.innerHTML;
        cardElement.innerHTML = `記錄中...`;

        const url = `${API_URL}?action=addLog&className=${encodeURIComponent(className)}&seat=${encodeURIComponent(seatStr)}&name=${encodeURIComponent(name)}`;
        
        fetch(url)
            .then(response => response.json())
            .then(data => {
                if(data.status === 'success') {
                    cardElement.className = 'card success';
                    cardElement.innerHTML = `✅ 已登記<br><b>${name}</b>`;
                    
                    setTimeout(() => {
                        cardElement.className = 'card student-card';
                        cardElement.innerHTML = originalHTML;
                    }, 1500);
                }
            })
            .catch(error => {
                cardElement.className = 'card error';
                cardElement.innerHTML = `❌ 失敗<br><b>重試</b>`;
                console.error(error);
                
                setTimeout(() => {
                    cardElement.className = 'card student-card';
                    cardElement.innerHTML = originalHTML;
                }, 2000);
            });
    }
</script>

</body>
</html>
